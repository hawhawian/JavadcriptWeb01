<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N*N乘法表</title>
    <style>
        body{
            background-color: #D2E9FF;
        }
        div#myId {
            width: 90%;
            background-color: aqua;
            padding: 10px;
            margin: 0 auto;
            margin-top: 20px;
        }
        table, tr, td{
            border: 1px solid black;
            border-collapse: collapse;
        }
        table{
            text-align:center;
            margin: 0 auto;
        }
        td{
            padding: 5px;
            text-align: center;
        }
    </style>
    <script>
        function myFunction() {
            var n = document.getElementById('numberInput').value;

            var str="<table>";

            for (let i = 1; i <= n; i++) {
                str+="<tr>";
                for (let j = 1; j <= n; j++) {
                    str+=`<td> ${i} * ${j} = ${i*j}</td>`;
                }
                str+="</tr>";
            }
            str+="</table>";

            document.getElementById("myId").innerHTML = str;
        }
    </script>
</head>

<body>
    <center>
        <a href="index.html">首頁</a>
        <a href="about.html">關於我</a>
        <a href="research.html">研究</a>
        <a href="homework.html">作業</a>
    </center>
    <center><h1>N*N乘法表</h1></center>
    <center>
        <label for="numberInput">輸入數值:</label>
        <input type="number" id="numberInput" placeholder="輸入數值" />
        <input type="button" value="OK" title="OK" onclick="myFunction()" />
    </center>
    <div id="myId"></div>
</body>

</html>
